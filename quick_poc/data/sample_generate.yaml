clause: 违约金条款（初始生成示例，替换为真实新条款）

# 初始生成：可能只有条款名 + 最简种子定义，没有既有规则
current_bom: |
  （初始，仅知这是"违约金条款"——合同中关于违约赔偿金额/计算的约定，暂无既有抽取规则。）

# 候选正例：来自测试集该条款的期望值（正例期望）。
# 模型从中挑选差异最大的 3-5 条作为 positive_examples（禁止编造/近义重复）。
# 故意放两条近似的，验证多样性挑选是否生效。
positive_candidates:
  - "每日按合同总价 0.5% 向甲公司支付违约金"
  - "每日按合同总价千分之五支付违约金"               # 与上一条近似，应被去重
  - "相当于年度服务费 20% 的违约损失"
  - "逾期付款的，按日加收万分之三的滞纳金"
  - "单方解约须赔偿对方 100 万元违约金"
