# ============================================================
# 黄金切片（两步法用）—— 同事提供的"差错数据"模板
# 挑 1 个准确率最低的条款，填 3~5 条典型 Badcase 即可（KISS）。
# 涉密数据手工打码（公司名→甲公司/乙公司，金额→N元）。
# ============================================================

clause: 违约金条款（示例，请替换为真实低准确率条款）

# 当前语义定义与抽取规则（旧 BOM）—— 直接复制现有配置
current_bom: |
  业务定义：识别合同中违约金的触发与计算约定。
  核心匹配规则：出现"违约金"且伴随"支付/赔偿"。
  绝对拦截规则：（暂无）
  正向关键词：违约金、滞纳金

# Badcase 列表（type: 漏抽=miss / 误抽=false_positive）
badcases:
  - id: 样本1
    type: 漏抽
    expected: "若乙方逾期交货，每日按合同总价 0.5% 向甲公司支付违约金"
    actual: ""                          # 漏抽 → 实际为空
    text: "乙方未按期交货的，自逾期之日起，每日按合同总价千分之五向甲公司支付违约金。"

  - id: 样本2
    type: 误抽
    expected: ""                         # 误抽 → 期望为空
    actual: "甲公司支付的 20000 元投标保证金不予退还"
    text: "若乙公司中标后弃标，甲公司已收取的投标保证金不予退还，并追究违约责任。"

  - id: 样本3
    type: 漏抽
    expected: "任何一方单方解除合同，须赔偿对方相当于年度服务费 20% 的违约损失"
    actual: ""
    text: "任何一方擅自提前终止本合同，应向守约方赔偿相当于年度服务费百分之二十的违约损失。"
