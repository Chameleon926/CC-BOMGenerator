# ============================================================
# 场景② 已跑优化样例（付款支持文档，含 Trace → 演示覆盖率缺口诊断）
# 用法：python rule_pipeline.py data/sample_slice.yaml --mode optimize
# ============================================================

clause: 付款支持文档
block_code: FSB0000004

# 召回画像数量（可配置，不填用默认 10/6/3）
keyword_count: 10
section_count: 6
query_count: 3

# 当前语义定义与规则（旧 BOM）—— 粘贴现有
current_bom: |
  业务定义：指向供应商支付款项时，供应商提交给华为的全套付款证明依据文件（发票、PO、验收证明等）。
  核心匹配规则：出现"付款支持文档"或同义词，且给出至少1种具体文档类型。
  绝对拦截规则（剔除）：必须剔除支付方式、付款方式、结算周期、付款日等无关表述。
  正向关键词：付款支持文档、增值税发票、PO、验收证明、付款里程碑

# 候选正例（来自测试集期望值）
positive_candidates:
  - "验收材料：1.供应商转账记录；2.总包方委托单位签章收据；3.发票扫描件"
  - "付款里程碑：验收后付款100%；验收标准：转账记录、签章收据、发票扫描件、合同扫描件"

# Badcase 列表（type: 漏抽=miss / 误抽=false_positive）
badcases:
  - id: 样本1
    type: 漏抽
    expected: "甲方收到乙方开具的有效完税发票后以转账方式，COD每周四集中支付… |里程碑|付款百分比|付款金额|付款条件|…"
    actual: "|里程碑|付款百分比|付款金额|付款条件| |报告验收通过|100%|同发票金额|报告通过甲方验收|"
    similarity: "0.47"            # 覆盖率 47% < 80% 阈值 → 判漏抽
    text: "覆盖率缺口：实际只抽了里程碑表，丢了付款排程段（期望含付款排程，但旧规则要求剔除付款日 → 冲突）。"
    # Trace：输入/输出两文件（路径相对本 yaml）。解析失败会报具体行号。
    trace_input: sample_traces/case1_input.txt
    trace_output: sample_traces/case1_output.txt

  - id: 样本2
    type: 误抽
    expected: ""                   # 误抽 → 期望为空
    actual: "供应商每月提供华为要求的申付文档，在华为验收合格且通知供应商开票后提供合格增值税发票"
    text: "抽到了相关但非目标句段（申付文档/发票），非该文档真正的付款支持内容。"
