# ============================================================
# 黄金切片（Golden Slice）数据模板
# 用法：挑 1 个常出错、具代表性的条款，填好下面四块，跑 run_rule_agent.py。
# 涉密数据手工打码即可（公司名→XXX、金额→N元、人名→张三）。
# 数据量：每类 3~5 条即可，KISS。
# ============================================================

# 目标条款名称
clause: 押金条款（示例，请替换为你的真实切片）

# 当前业务定义与规则（旧 BOM）—— 粘贴现有定义/匹配规则/拦截规则/关键词
current_bom: |
  业务定义：识别合同中关于保证金/押金的缴纳与退还约定。
  核心匹配规则：出现"保证金/押金"且涉及"支付/缴纳"。
  绝对拦截规则：（暂无）
  正向关键词：保证金、押金

# 正例：当前规则已经抽对的合同原文
good_cases:
  - "甲方应向乙方支付保证金 10000 元，于合同签订后 5 个工作日内付清。"
  - "本合同履约保证金为合同总价的 5%，验收合格后无息退还。"

# 漏抽反例：本该抽出、却没抽出来的原文（修"核心匹配规则/画像"）
miss_cases:
  - "乙方须于发货前向甲方交纳履约性质的安全担保金两万元。"
  - "丙方已代为垫付的保函押金，由甲方在结算时予以扣抵返还。"

# 误抽反例：本不该抽出、却错误抽出来的原文（加"绝对拦截规则"）
false_cases:
  - "若乙方违约，甲方有权没收其已支付的货款作为违约金。"
  - "供应商须缴纳的投标保证金由招标代理机构收取，与本合同无关。"
